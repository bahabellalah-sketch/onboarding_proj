# Server Configuration
server.port=8082
server.address=0.0.0.0

# Database Configuration
# maxAllowedPacket must be >= largest blob insert (document file); aligns with server max_allowed_packet
spring.datasource.url=jdbc:mysql://localhost:3306/onboarding_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=604800000
# 7 jours au lieu de 24 heures pour une meilleure expérience utilisateur

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=baha.bellalah@gmail.com
spring.mail.password=qcbn hqal jqwq cyhc
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Response configuration
server.servlet.session.timeout=30m
# Tomcat caps the entire POST body (including multipart) — default is 2MB and causes 500 on larger uploads
server.tomcat.max-http-form-post-size=100MB
server.tomcat.max-swallow-size=100MB
# Spring multipart limits (single file + whole request)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB

# Frontend URL (used in email links)
# ⚠️ NO LONGER USED - Auto-detected at startup by EmailService.java
# The IP is now detected dynamically using NetworkInterface
# Leave this commented out or update as a fallback only
# app.frontend.base-url=http://localhost:3000

# CORS Configuration
spring.web.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# AI LLM Configuration (OpenAI-compatible)
# For Ollama (local): http://localhost:11434/v1/chat/completions
# For OpenAI: https://api.openai.com/v1/chat/completions
ai.api.url=http://localhost:11434/v1/chat/completions
ai.model=mistral
ai.api.key=
ai.temperature=0.8

# Document Storage Configuration
app.document.storage.path=./uploads/documents
app.document.max-size=104857600
